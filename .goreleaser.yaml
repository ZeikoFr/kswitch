version: 2

project_name: kswitch

builds:
  - id: switcher
    main: .
    binary: switcher
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -w
        -X github.com/MichaelSp/kswitch/cmd/switcher.version={{.Version}}
        -X github.com/MichaelSp/kswitch/cmd/switcher.buildDate={{.Date}}

# Upload raw binaries (no archives/tarballs).
# name_template matches the original release asset naming: switcher_{os}_{arch}
# (goreleaser automatically appends .exe for windows)
archives:
  - formats:
      - binary
    name_template: "switcher_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  # Upload switch.sh alongside the binaries
  extra_files:
    - glob: hack/switch/switch.sh

snapshot:
  version_template: "{{ .Tag }}-next"
